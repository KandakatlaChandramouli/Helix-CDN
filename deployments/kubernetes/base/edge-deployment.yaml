apiVersion: apps/v1
kind: Deployment
metadata:
  name: helix-edge
  namespace: helix
spec:
  replicas: 3
  selector:
    matchLabels:
      app: helix-edge
  template:
    metadata:
      labels:
        app: helix-edge
    spec:
      containers:
      - name: helix-edge
        image: helixcdn:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 9000
        - containerPort: 18080
        readinessProbe:
          httpGet:
            path: /stats
            port: 18080
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /stats
            port: 18080
          initialDelaySeconds: 10
          periodSeconds: 10
